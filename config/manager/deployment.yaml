apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-operator
  namespace: orbit-operator
  labels:
    app.kubernetes.io/name: orbit-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orbit-operator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbit-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: orbit-operator
      containers:
        - name: operator
          image: quay.io/gshanmug-quay/orbit-operator:0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: healthz
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
