apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: orbitinstances.orbit.redhat.com
spec:
  group: orbit.redhat.com
  names:
    kind: OrbitInstance
    listKind: OrbitInstanceList
    plural: orbitinstances
    singular: orbitinstance
    shortNames:
      - orbit
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Route
          type: string
          jsonPath: .status.route
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                # ---- Authentication ----
                auth:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum: ["openshift", "rhsso"]
                      default: "openshift"
                      description: >-
                        Authentication provider. "openshift" uses the built-in
                        OAuth server; "rhsso" uses Red Hat SSO / Keycloak.
                    rhsso:
                      type: object
                      description: Required when auth.provider is "rhsso".
                      properties:
                        issuerUrl:
                          type: string
                          description: OIDC issuer URL (e.g. https://sso.example.com/realms/orbit).
                        clientId:
                          type: string
                        clientSecret:
                          type: object
                          properties:
                            secretRef:
                              type: string
                              description: Name of the Secret containing the client secret.
                            key:
                              type: string
                              default: client-secret
                              description: Key within the Secret.
                          required: ["secretRef"]
                      required: ["issuerUrl", "clientId", "clientSecret"]
                # ---- AI Provider ----
                ai:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum: ["vertex", "anthropic"]
                      default: "vertex"
                      description: >-
                        AI backend. "vertex" uses GCP Vertex AI with ADC;
                        "anthropic" uses a direct API key.
                    vertexProjectId:
                      type: string
                      description: GCP project ID for Vertex AI.
                    vertexRegion:
                      type: string
                      default: "us-east5"
                    anthropicApiKeySecret:
                      type: object
                      description: Reference to a Secret holding the Anthropic API key.
                      properties:
                        secretRef:
                          type: string
                        key:
                          type: string
                          default: api-key
                      required: ["secretRef"]
                    defaultModel:
                      type: string
                      default: "claude-sonnet-4-20250514"
                # ---- Images ----
                images:
                  type: object
                  description: Override container image references.
                  properties:
                    backend:
                      type: string
                      default: "quay.io/gshanmug-quay/orbit-backend:latest"
                    frontend:
                      type: string
                      default: "quay.io/gshanmug-quay/orbit-frontend:latest"
                    postgres:
                      type: string
                      default: "pgvector/pgvector:pg16"
                    redis:
                      type: string
                      default: "redis:7-alpine"
                    oauthProxy:
                      type: string
                      default: "registry.redhat.io/openshift4/ose-oauth-proxy:latest"
                # ---- PostgreSQL ----
                postgres:
                  type: object
                  properties:
                    storageSize:
                      type: string
                      default: "10Gi"
                      description: PVC size for PostgreSQL data.
                    storageClassName:
                      type: string
                      description: StorageClass name (omit to use cluster default).
                # ---- Redis ----
                redis:
                  type: object
                  properties:
                    memoryLimit:
                      type: string
                      default: "256Mi"
                # ---- Backend ----
                backend:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      minimum: 1
                      default: 2
                # ---- Frontend ----
                frontend:
                  type: object
                  properties:
                    replicas:
                      type: integer
                      minimum: 1
                      default: 1
                # ---- GCP ----
                gcp:
                  type: object
                  description: GCP service account for Vertex AI authentication.
                  properties:
                    serviceAccountSecret:
                      type: string
                      description: >-
                        Name of a Secret containing the GCP SA key JSON
                        (key: "sa-key.json").
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Provisioning", "Migrating", "Ready", "Error"]
                route:
                  type: string
                  description: The externally reachable URL.
                message:
                  type: string
                components:
                  type: object
                  properties:
                    postgres:
                      type: string
                    redis:
                      type: string
                    backend:
                      type: string
                    frontend:
                      type: string
